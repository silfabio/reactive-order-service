services:
  prometheus:
    image: prom/prometheus:latest
    container_name: reactive-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    environment:
      - APP_TARGET=host.docker.internal:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: reactive-zipkin
    ports:
      - "9411:9411"

  grafana:
    image: grafana/grafana:latest
    container_name: reactive-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    depends_on:
      - prometheus

  sonarqube:
    image: sonarqube:community
    container_name: reactive-sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/system/status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  kafka:
    image: apache/kafka:latest
    container_name: reactive-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  floci:
    image: floci/floci:latest
    container_name: reactive-floci
    ports:
      - "4566:4566"
      - "7001-7099:7001-7099"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      FLOCI_HOSTNAME: floci
      FLOCI_SERVICES_DOCKER_NETWORK: reactive-order-service_default
    labels:
      org.springframework.boot.readiness-check.tcp.disable: "true"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_floci/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Dev-mode Vault: in-memory storage, auto-unsealed, fixed root token "root".
  # Used to apply the Vault PKI Terraform module locally so the Order Service
  # can fetch real short-lived mTLS certs. NEVER use this configuration
  # outside local development — production uses the Vault HA cluster from
  # modules/vault with KMS auto-unseal and no fixed token. All PKI mounts are
  # wiped on every container restart; run `make dev-down && make dev` for a
  # clean PKI run.
  vault:
    image: hashicorp/vault:1.18
    container_name: reactive-vault
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8200/v1/sys/health?standbyok=true"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # TLS + mTLS Postgres for local dev. Server cert/key + CA chain are issued
  # by the Vault PKI module (module.vault_pki) into ./.certs before this
  # service starts (see scripts/dev-up.sh). The "order_service" role
  # authenticates via a Vault-issued client cert (CN order-service.client,
  # mapped via pg_ident.conf); DB_USER/DB_PASSWORD remain password-auth for
  # Flyway migrations.
  postgres:
    image: postgres:16
    container_name: reactive-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./infra/postgres/pg_ident.conf:/etc/postgresql/pg_ident.conf:ro
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
      - ./infra/postgres/entrypoint.sh:/usr/local/bin/mtls-entrypoint.sh:ro
      - ./.certs:/run/certs:ro
    entrypoint: ["/usr/local/bin/mtls-entrypoint.sh"]
    command:
      - postgres
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
      - -c
      - ident_file=/etc/postgresql/pg_ident.conf
      - -c
      - ssl=on
      - -c
      - ssl_cert_file=/var/lib/postgresql/certs/server.crt
      - -c
      - ssl_key_file=/var/lib/postgresql/certs/server.key
      - -c
      - ssl_ca_file=/var/lib/postgresql/certs/ca.crt
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d orders_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pgdata:
