name: Security and Linting

on:
  push:
    branches:
      - main
      - chore/prepare-for-public-release # Run CI on push to this branch
  pull_request:
    branches: [ main ]

jobs:
  # ktlint:
  #   name: Ktlint Check
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v3
  #     - name: Set up JDK 21
  #       uses: actions/setup-java@v3
  #       with:
  #         java-version: '21'
  #         distribution: 'temurin'
  #     - name: Run ktlint
  #       run: ./gradlew ktlintCheck

  super-linter:
    name: Super-Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          # Full git history is needed to get a proper list of changed files
          fetch-depth: 0

      - name: Lint Repository
        uses: github/super-linter@v5
        with:
          # Exclude Kotlin files since they are handled by the dedicated ktlint job
          # This filter is now less critical as the ktlint job is disabled, but good to keep for future re-enabling
          filter_regex_exclude: .*src/.*\.kt
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          # Full git history is needed for the scan
          fetch-depth: 0
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          # Scan the entire history
          path: ./
          base: ${{ github.event.before }}
          head: HEAD
          extra_args: --only-verified
