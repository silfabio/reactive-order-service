# SonarQube/SonarCloud Base Configuration
# Committed to version control — contains non-secret project settings for SonarCloud.

sonar.projectKey=reactive-order-service
sonar.organization=silfabio

# --- Project Structure ---
sonar.sources=src/main/kotlin
sonar.java.binaries=build/classes/kotlin/main
sonar.tests=src/test/kotlin

# --- Report Paths ---
sonar.junit.reportPaths=build/test-results/test
sonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml

# --- Exclusions ---
sonar.coverage.exclusions=**/*Test.kt,**/*Tests.kt,**/*Application.kt
