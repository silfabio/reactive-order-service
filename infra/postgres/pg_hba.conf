# pg_hba.conf for local mTLS development.
#
# - The postgres-image entrypoint connects via the local unix socket while
#   running docker-entrypoint-initdb.d scripts (and so does pg_isready) —
#   allow that unconditionally.
# - "order_service" authenticates with a Vault-issued client certificate;
#   its CN (order-service.client) is mapped to the role via pg_ident.conf.
# - DB_USER (Flyway/migrations) authenticates with a password over TLS.
# - Everything else is rejected by the implicit "no match" default.

# TYPE    DATABASE   USER           ADDRESS       METHOD
local     all        all                          trust
hostssl   orders_db  order_service  0.0.0.0/0     cert map=order_service_map
hostssl   orders_db  all            0.0.0.0/0     scram-sha-256
hostssl   all        all            0.0.0.0/0     scram-sha-256
