---
spring:
  application:
    name: reactive-order-service

  # R2DBC configuration for reactive database access
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/orders_db
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  # Flyway configuration for database migrations (uses JDBC). sslmode=require
  # satisfies the hostssl-only pg_hba.conf rules without certificate verification —
  # migrations run as DB_USER (password auth), not the mTLS order_service role.
  flyway:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/orders_db?sslmode=require
    user: ${DB_USER}
    password: ${DB_PASSWORD}
    enabled: true

  # Kafka configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.value.default.type: com.fabio.orderservice.domain.Order
        spring.json.trusted.packages: "*"

  # Spring Cloud Stream binding configuration
  cloud:
    stream:
      bindings:
        # Maps the consumer function 'processOrder' to the 'order-events' topic
        processOrder-in-0:
          destination: order-events
        # Maps the producer (StreamBridge) to the 'order-events' topic
        publishOrder-out-0:
          destination: order-events

# Actuator configuration for monitoring
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

resilience4j:
  retry:
    instances:
      orderRepository:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - io.r2dbc.spi.R2dbcTransientResourceException

# Vault PKI: issues the short-lived mTLS client certificate the Order Service
# presents to Postgres (see infra/terraform/modules/vault-pki). AppRole credentials
# are written to infra/terraform/.env.floci by scripts/dev-up.sh.
vault:
  pki:
    enabled: ${VAULT_PKI_ENABLED:true}
    address: ${VAULT_ADDR:http://localhost:8200}
    app-role-id: ${VAULT_APPROLE_ROLE_ID:}
    app-role-secret-id: ${VAULT_APPROLE_SECRET_ID:}
    pki-mount-path: pki-int
    client-cert-role: order-service-client
    common-name: order-service.client
